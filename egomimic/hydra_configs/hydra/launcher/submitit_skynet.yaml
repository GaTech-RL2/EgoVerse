defaults:
  - submitit_slurm

_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

name: ${hydra.job.name}
partition: "rl2-lab"
account: "rl2-lab"
# Override nodes via: hydra.launcher.nodes=<num_nodes>
cpus_per_task: 15

nodes: ${launch_params.nodes}                      
tasks_per_node: ${launch_params.gpus_per_node}    
gres: "gpu:l40s:${eval:'${launch_params.gpus_per_node} * ${launch_params.nodes}'}"
mem_per_gpu: 250G

qos: "short"
timeout_min: 2880 # 48 hours

# env:
#   NCCL_TIMEOUT: 7200
#   NCCL_DEBUG: INFO
#   NCCL_ASYNC_ERROR_HANDLING: "1"

additional_parameters:
  requeue: true