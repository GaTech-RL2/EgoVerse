_target_: egomimic.pl_utils.pl_model.ModelWrapper
robomimic_model:
  _target_: egomimic.algo.cosmos_policy.CosmosPolicy
  data_schematic: _${data.dataset.data_schematic}
  camera_transforms:
    eva_bimanual:
      _target_: egomimic.utils.egomimicUtils.CameraTransforms
      intrinsics_key: "base" # change to base_half if using half res 
      extrinsics_key: "x5Dec13_2"
  
  domains: ["eva_bimanual"]

  # Cosmos Policy specific parameters
  action_chunk: 25 # Should match the dataset config
  use_proprio: true  # Whether to use proprioception
  use_values: true  # Whether to include value latents (not used in current training)
  final_image_size: 224  # Target image size for cosmos_policy
  num_duplicates_per_image: 4 # Number of times to duplicate each image (so that each type of image fills 1 latent frame when encoded with the tokenizer)
  normalize_images: false  # Whether to normalize images to [0, 1] range; Cosmos Policy expects uint8 images in [0, 255]
  use_image_aug: true  # Whether to apply image augmentations during preprocessing
  use_stronger_image_aug: false  # Whether to use stronger image augmentations during training

  # Cosmos Policy model config
  # When checkpoint_path is set and net is omitted, the default net is cosmos_v1_2B (MinimalV1LVGDiT / MiniTrainDIT 2B), aligned with cosmos-policy libero training and the 480p base checkpoint.
  # Set use_mini_net: true for debug to use a small net (2 blocks, 1024 dim) and avoid OOM; checkpoint is not loaded.
  model_config:
    checkpoint_path: "hf://nvidia/Cosmos-Predict2-2B-Video2World/model-480p-16fps.pt"
    conditioner:
      text:
        # IMPORTANT: We don't want any text dropout; otherwise, the model may fail to follow language
        dropout_rate: 0.0
    state_t: 11  # Latent temporal dim (blank, proprio, left_wrist_img, right_wrist_img, front_img_1, action, future proprio, future left_wrist_img, future right_wrist_img, future front_img_1, value)
    min_num_conditional_frames: 5  # 1 blank, 4 conditioning (proprio, left_wrist_img, right_wrist_img, front_img_1)
    max_num_conditional_frames: 5  # 1 blank, 4 conditioning (proprio, left_wrist_img, right_wrist_img, front_img_1)
    sigma_conditional: 0.0  # No noise on conditional latents
    conditioning_strategy: "frame_replace"
    denoise_replace_gt_frames: true
    tokenizer:
      chunk_duration: 41  # 1 blank + 40 images (4 proprio, 4 left_wrist_img, 4 right_wrist_img, 4 front_img_1, 4 action, 4 future proprio, 4 future left_wrist_img, 4 future right_wrist_img, 4 future front_img_1, 4 value)
    ema:
      enabled: false
    input_data_key: "video"
    sde:
      hybrid_sigma_distribution: true
      p_mean: 1.3862943611198906  # Copied from base model config
      p_std: 1.2
      sigma_max: 200
      sigma_min: 0.01
      uniform_lower: 1.0
      uniform_upper: 85.0
    adjust_video_noise: true
    resize_online: true
    resolution: "224"
    high_sigma_strategy: "none"
    # DiT timestep embedder expects float32; use_wan_fp32_strategy casts timesteps to float32 and enables fp32 autocast in the net
    use_wan_fp32_strategy: true
    use_mini_net: true # to use a small net (2 blocks, 1024 dim) and avoid OOM; checkpoint is not loaded.

  # Note: not used
  train_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Resize
        size: 224
        interpolation: 3
  eval_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Resize
        size: 224
        interpolation: 3

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-4
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.0

scheduler:
  _target_: transformers.get_cosine_schedule_with_warmup
  _partial_: true
  num_warmup_steps: 1000
  num_training_steps: 100000
  num_cycles: 0.5

