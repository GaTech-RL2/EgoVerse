defaults:
  - hpt_cotrain_enc_dec_base

robomimic_model:
  ac_keys:
    eva_bimanual: "actions_cartesian"
    aria_bimanual: "actions_cartesian"
  shared_ac_key: "actions_cartesian"

  6dof: true
  diffusion: true
  
  head_specs:
    aria_bimanual: null
    eva_bimanual: null
    shared:
      _target_: egomimic.models.fm_policy.FMPolicy
      action_horizon: 100
      num_inference_steps: 50
      pooling: null
      padding: "zero"
      time_dist: "beta"
      infer_ac_dims:
        eva_bimanual: 14
        aria_bimanual: 14
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 14
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4 
        mlp_ratio: 4

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-5
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1400
  eta_min: 1e-5