defaults:
  - hpt_cotrain_enc_dec_base

robomimic_model:
  domains: ["eva_bimanual", "mecka_bimanual", "aria_bimanual"]

  ac_keys:
    eva_bimanual: "actions_cartesian"
    aria_bimanual: "actions_cartesian"
    mecka_bimanual: "actions_cartesian"
  shared_ac_key: "actions_cartesian"

  camera_transforms:
    mecka_bimanual:
      _target_: egomimic.utils.egomimicUtils.CameraTransforms
      intrinsics_key: "mecka" # change to base_half if using half res 
      extrinsics_key: "x5Dec13_2"
  
  6dof: true
  diffusion: true
  stem_specs:
    mecka_bimanual:
      state_ee_pose:
        _target_: egomimic.models.hpt_nets.MLPPolicyStem
        input_dim: 12
        output_dim: 256
        widths: [256]
        specs:
          random_horizon_masking: false
          cross_attn:
            crossattn_latent: 16
            crossattn_heads: 8
            crossattn_dim_head: 64
            crossattn_modality_dropout: 0.1
            modality_embed_dim: 256

  head_specs:
    aria_bimanual: null
    eva_bimanual: null
    mecka_bimanual: null
    shared:
      _target_: egomimic.models.fm_policy.FMPolicy
      action_horizon: 100
      num_inference_steps: 50
      pooling: null
      padding: "zero"
      time_dist: "beta"
      infer_ac_dims:
        eva_bimanual: 14
        aria_bimanual: 14
        mecka_bimanual: 14
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 256
        act_dim: 14
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4 
        mlp_ratio: 4

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 1e-4
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1400
  eta_min: 5e-5