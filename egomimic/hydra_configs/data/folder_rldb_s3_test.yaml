_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  dataset1:
    _target_: rldb.utils.MultiRLDBDataset
    datasets:
      test:
        _target_: rldb.utils.S3RLDBDataset
        bucket_name: "rldb"
        task: "fold_cloth/"
        lab: "eth"
        scene: "scene_10"
        mode: train
        local_files_only: True
        fresh_download: True

valid_datasets:
  dataset1:
    _target_: rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    task: "fold_cloth/"
    lab: "eth"
    scene: "scene_10"
    mode: valid
    local_files_only: True
    fresh_download: True

train_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 10

valid_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 10
