_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  dataset1:
    _target_: egomimic.rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    main_prefix: "mecka"
    mode: train
    embodiment: "mecka_bimanual"
    temp_root: "/coc/flash7/scratch/egoverseS3Dataset"
    filters: 
      lab: "mecka"
      task: "fold_clothes"
    local_files_only: True

valid_datasets:
  dataset1:
    _target_: egomimic.rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    mode: valid
    embodiment: "mecka_bimanual"
    temp_root: "/coc/flash7/scratch/egoverseS3Dataset"        
    filters: 
      lab: "mecka"
      task: "fold_clothes"
    local_files_only: True

train_dataloader_params:
  dataset1:
    batch_size: 64
    num_workers: 10

valid_dataloader_params:
  dataset1:
    batch_size: 64
    num_workers: 10