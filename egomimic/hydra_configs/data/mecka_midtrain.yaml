_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  dataset1:
    _target_: rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    main_prefix: "mecka"
    mode: train
    embodiment: "mecka_bimanual"
    filters: 
      lab: "mecka"
    local_files_only: True

valid_datasets:
  dataset1:
    _target_: rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    mode: valid
    embodiment: "mecka_bimanual"
    filters: 
      lab: "mecka"
    local_files_only: True

train_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 8

valid_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 8