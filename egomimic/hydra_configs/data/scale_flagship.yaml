_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper
train_datasets:
  dataset1:
    _target_: egomimic.rldb.utils.S3RLDBDataset
    bucket_name: rldb
    mode: train
    embodiment: scale_bimanual
    filters:
      task: Folding Clothes
    local_files_only: true


valid_datasets:
  dataset1:
    _target_: egomimic.rldb.utils.S3RLDBDataset
    bucket_name: rldb
    mode: valid
    embodiment: scale_bimanual
    filters:
      task: Folding Clothes
    local_files_only: true
train_dataloader_params:
  dataset1:
    batch_size: 64
    num_workers: 10
  dataset2:
    batch_size: 64
    num_workers: 10
valid_dataloader_params:
  dataset1:
    batch_size: 64
    num_workers: 10
  dataset2:
    batch_size: 64
    num_workers: 10