      key_map:
        observations.images.front_img_1: #batch key
          key_type: camera_keys # key type
          zarr_key: images.front_1
        right.action_ee_pose:
          key_type: action_keys
          zarr_key: right.obs_ee_pose
          horizon: 30
        left.action_ee_pose:
