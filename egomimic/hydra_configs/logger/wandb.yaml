# https://wandb.ai

wandb:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  # name: "" # name of the run (normally generated by wandb)
  save_dir: "${paths.output_dir}"
  offline: False
  # id: "${name}_${description}_${wandb_run_id}" # deterministic hash from run_req.sh for experiment grouping
  id: "${wandb_run_id}" # deterministic hash from run_req.sh for experiment grouping
  anonymous: null # enable anonymous logging
  project: "objInBowl"
  log_model: False # upload lightning ckpts
  prefix: "" # a string to put at the beginning of metric keys
  entity: "EgoMimic" # set to name of your wandb team
  group: ""
  tags: []
  job_type: ""