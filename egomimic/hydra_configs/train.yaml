defaults:
  - model: pi0.5
  - paths: default
  - trainer: ddp_pi
  - debug: null
  - logger: wandb
  - data: mecka_all
  - callbacks: checkpoints
  - override hydra/launcher: submitit_pace
  - _self_

name: test
description: test
ckpt_path: null
train: true
eval: false

eval_class:
  _target_ : egomimic.scripts.evaluation.Eve
  mode: real
  arm: both
  eval_path: "./logs/eval/${name}_${now:%Y-%m-%d_%H-%M-%S}"

hydra:
  run:
    # Dir should be experiment_name/description_{timestamp}
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}

launch_params:
  gpus_per_node: 2
  nodes: 1

data_schematic: # Dynamically fill in these shapes from the dataset
  _target_: egomimic.rldb.utils.DataSchematic
  norm_mode: quantile
  schematic_dict:
    eva_right_arm:
      base_0_rgb: #batch key
        key_type: camera_keys # key type
        lerobot_key: observations.images.front_img_1 # dataset key
      right_wrist_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.right_wrist_img
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose
      actions_joints:
        key_type: action_keys
        lerobot_key: actions_joints
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_cartesian
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
    eva_bimanual:
      base_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.front_img_1
      right_wrist_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.right_wrist_img
      left_wrist_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.left_wrist_img
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose
      actions_joints:
        key_type: action_keys
        lerobot_key: actions_joints
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_cartesian
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
    aria_right_arm:
      base_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.front_img_1
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_cartesian
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
    aria_bimanual:
      base_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.front_img_1
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_cartesian
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
    mecka_bimanual:
      base_0_rgb:
        key_type: camera_keys
        lerobot_key: observations.images.front_img_1
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose_cam
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_ee_cartesian_cam
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
  viz_img_key: 
    eva_right_arm:
      base_0_rgb
    eva_bimanual:
      base_0_rgb
    aria_bimanual:
      base_0_rgb
    aria_right_arm:
      base_0_rgb
    mecka_bimanual:
      base_0_rgb
