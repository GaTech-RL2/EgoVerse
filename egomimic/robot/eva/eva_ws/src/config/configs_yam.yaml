# YAM Robot Configuration
# 
# This configuration is for YAM robot teleoperation with D405 cameras.
# No Aria glasses - only RealSense D405 wrist cameras.
#
# To use this config, either:
# 1. Copy this file to configs.yaml
# 2. Or modify the config loading code to use this file directly

# YAM robot doesn't use URDF - it uses MuJoCo XML from i2rt library
# The model is determined by gripper_type in YAMInterface

# CAN interfaces for YAM arms
# Change these to match your hardware setup
interfaces:
  left: can_left
  right: can_right

topic_prefix_out: eva_ik
ik_rate: 50.0
ts_offset: 0.4
gripper_width: 0.8

# VR teleop velocity limits (per tick at 30Hz). 0 = disabled.
vr_teleop:
  max_delta_pos: 0.01       # meters/tick (0.01 = 30cm/s)
  max_delta_rot_deg: 5.0    # degrees/tick (5.0 = 150deg/s)

